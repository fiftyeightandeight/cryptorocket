name: Collect Deribit Options Data

on:
  workflow_dispatch:
    inputs:
      backfill_dvol:
        description: "Backfill DVOL candles"
        type: boolean
        default: false
      backfill_rv:
        description: "Backfill realized volatility"
        type: boolean
        default: false
      backfill_settlements:
        description: "Backfill option settlements"
        type: boolean
        default: false
      backfill_deliveries:
        description: "Backfill delivery prices"
        type: boolean
        default: false
      backfill_all:
        description: "Run snapshot + all backfills"
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_BOT_TOKEN }}
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect Deribit data
        run: |
          FLAGS=""
          if [ "${{ inputs.backfill_all }}" = "true" ]; then
            FLAGS="--all"
          else
            if [ "${{ inputs.backfill_dvol }}" = "true" ]; then
              FLAGS="$FLAGS --backfill-dvol"
            fi
            if [ "${{ inputs.backfill_rv }}" = "true" ]; then
              FLAGS="$FLAGS --backfill-rv"
            fi
            if [ "${{ inputs.backfill_settlements }}" = "true" ]; then
              FLAGS="$FLAGS --backfill-settlements"
            fi
            if [ "${{ inputs.backfill_deliveries }}" = "true" ]; then
              FLAGS="$FLAGS --backfill-deliveries"
            fi
          fi
          python -m scripts.collect_deribit $FLAGS

      - name: Report summary
        run: |
          python -c "
          import duckdb, os
          conn = duckdb.connect('data/crypto.duckdb', read_only=True)

          snap_count = conn.execute(
              'SELECT COUNT(*) FROM options_snapshots'
          ).fetchone()[0]
          instr_count = conn.execute(
              'SELECT COUNT(DISTINCT instrument_name) FROM options_snapshots'
          ).fetchone()[0]
          latest = conn.execute(
              'SELECT MAX(snapshot_ts) FROM options_snapshots'
          ).fetchone()[0]
          dvol_count = conn.execute(
              'SELECT COUNT(*) FROM dvol'
          ).fetchone()[0]
          settle_count = conn.execute(
              'SELECT COUNT(*) FROM options_settlements'
          ).fetchone()[0]

          conn.close()

          summary = f'''## Deribit Options Data Summary
          | Metric | Value |
          |--------|-------|
          | Snapshot rows | {snap_count:,} |
          | Unique instruments | {instr_count:,} |
          | Latest snapshot | {latest} |
          | DVOL candles | {dvol_count:,} |
          | Settlement records | {settle_count:,} |
          '''

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          "

      - name: Commit and push database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/crypto.duckdb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "data: update deribit options database [skip ci]"
            git pull --rebase origin main
            git push
          }
