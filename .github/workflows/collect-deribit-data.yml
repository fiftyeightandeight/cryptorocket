name: Collect Deribit Options Data

on:
  workflow_dispatch:
    inputs:
      backfill_dvol:
        description: "Backfill DVOL candles"
        type: boolean
        default: false
      backfill_rv:
        description: "Backfill realized volatility"
        type: boolean
        default: false
      backfill_all:
        description: "Run snapshot + all backfills"
        type: boolean
        default: false

concurrency:
  group: data-db-push
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download database from release
        run: gh release download data-latest -p crypto.duckdb -D data/ --clobber 2>/dev/null || echo "No existing release, starting fresh"
        env:
          GH_TOKEN: ${{ secrets.DATA_BOT_TOKEN }}

      - name: Snapshot options chain
        run: python -m scripts.collect_deribit

      - name: Backfill DVOL
        if: inputs.backfill_dvol == true || inputs.backfill_all == true
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-dvol

      - name: Backfill realized volatility
        if: inputs.backfill_rv == true || inputs.backfill_all == true
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-rv

      - name: Reset stale backfill cursor (one-time migration)
        run: python -c "import duckdb; c = duckdb.connect('data/crypto.duckdb'); c.execute(\"DELETE FROM backfill_state WHERE task_name LIKE 'settlements%'\"); c.close()" 2>/dev/null || true

      - name: Incremental settlements backfill
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-settlements

      - name: Incremental delivery prices backfill
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-deliveries

      - name: Checkpoint database (flush WAL to main file)
        run: python -c "import duckdb; c = duckdb.connect('data/crypto.duckdb'); c.execute('CHECKPOINT'); c.close()"

      - name: Upload database to release
        run: |
          gh release upload data-latest data/crypto.duckdb --clobber 2>/dev/null || \
          gh release create data-latest data/crypto.duckdb \
            --title "Latest database" \
            --notes "Auto-updated by collect-deribit-data workflow"
        env:
          GH_TOKEN: ${{ secrets.DATA_BOT_TOKEN }}

      - name: Report summary
        if: always()
        run: |
          python -c "
          import duckdb, os
          db = 'data/crypto.duckdb'
          if not os.path.exists(db):
              print('No database file found')
              exit(0)
          conn = duckdb.connect(db, read_only=True)

          snap_count = conn.execute(
              'SELECT COUNT(*) FROM options_snapshots'
          ).fetchone()[0]
          instr_count = conn.execute(
              'SELECT COUNT(DISTINCT instrument_name) FROM options_snapshots'
          ).fetchone()[0]
          latest = conn.execute(
              'SELECT MAX(snapshot_ts) FROM options_snapshots'
          ).fetchone()[0]
          dvol_count = conn.execute(
              'SELECT COUNT(*) FROM dvol'
          ).fetchone()[0]
          settle_count = conn.execute(
              'SELECT COUNT(*) FROM options_settlements'
          ).fetchone()[0]
          rv_count = conn.execute(
              'SELECT COUNT(*) FROM realized_volatility'
          ).fetchone()[0]
          dp_count = conn.execute(
              'SELECT COUNT(*) FROM delivery_prices'
          ).fetchone()[0]

          conn.close()

          summary = f'''## Deribit Options Data Summary
          | Metric | Value |
          |--------|-------|
          | Snapshot rows | {snap_count:,} |
          | Unique instruments | {instr_count:,} |
          | Latest snapshot | {latest} |
          | DVOL candles | {dvol_count:,} |
          | Realized vol records | {rv_count:,} |
          | Settlement records | {settle_count:,} |
          | Delivery prices | {dp_count:,} |
          '''

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          "
