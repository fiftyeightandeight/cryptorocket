name: Collect Deribit Options Data

on:
  workflow_dispatch:
    inputs:
      backfill_dvol:
        description: "Backfill DVOL candles"
        type: boolean
        default: false
      backfill_rv:
        description: "Backfill realized volatility"
        type: boolean
        default: false
      backfill_settlements:
        description: "Backfill option settlements"
        type: boolean
        default: false
      backfill_deliveries:
        description: "Backfill delivery prices"
        type: boolean
        default: false
      backfill_all:
        description: "Run snapshot + all backfills"
        type: boolean
        default: false

concurrency:
  group: data-db-push
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_BOT_TOKEN }}
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Snapshot options chain
        run: python -m scripts.collect_deribit --skip-snapshot=false

      - name: Checkpoint — snapshot
        run: |
          git fetch origin main
          git reset --soft origin/main
          git add data/crypto.duckdb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "data: deribit snapshot [skip ci]"
            git push
          }

      - name: Backfill DVOL
        if: inputs.backfill_dvol == true || inputs.backfill_all == true
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-dvol

      - name: Checkpoint — DVOL
        if: inputs.backfill_dvol == true || inputs.backfill_all == true
        run: |
          git fetch origin main
          git reset --soft origin/main
          git add data/crypto.duckdb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "data: deribit DVOL backfill [skip ci]"
            git push
          }

      - name: Backfill realized volatility
        if: inputs.backfill_rv == true || inputs.backfill_all == true
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-rv

      - name: Checkpoint — realized vol
        if: inputs.backfill_rv == true || inputs.backfill_all == true
        run: |
          git fetch origin main
          git reset --soft origin/main
          git add data/crypto.duckdb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "data: deribit realized vol backfill [skip ci]"
            git push
          }

      - name: Backfill settlements
        if: inputs.backfill_settlements == true || inputs.backfill_all == true
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-settlements

      - name: Checkpoint — settlements
        if: inputs.backfill_settlements == true || inputs.backfill_all == true
        run: |
          git fetch origin main
          git reset --soft origin/main
          git add data/crypto.duckdb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "data: deribit settlements backfill [skip ci]"
            git push
          }

      - name: Backfill delivery prices
        if: inputs.backfill_deliveries == true || inputs.backfill_all == true
        run: python -m scripts.collect_deribit --skip-snapshot --backfill-deliveries

      - name: Checkpoint — delivery prices
        if: inputs.backfill_deliveries == true || inputs.backfill_all == true
        run: |
          git fetch origin main
          git reset --soft origin/main
          git add data/crypto.duckdb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "data: deribit delivery prices backfill [skip ci]"
            git push
          }

      - name: Report summary
        if: always()
        run: |
          python -c "
          import duckdb, os
          conn = duckdb.connect('data/crypto.duckdb', read_only=True)

          snap_count = conn.execute(
              'SELECT COUNT(*) FROM options_snapshots'
          ).fetchone()[0]
          instr_count = conn.execute(
              'SELECT COUNT(DISTINCT instrument_name) FROM options_snapshots'
          ).fetchone()[0]
          latest = conn.execute(
              'SELECT MAX(snapshot_ts) FROM options_snapshots'
          ).fetchone()[0]
          dvol_count = conn.execute(
              'SELECT COUNT(*) FROM dvol'
          ).fetchone()[0]
          settle_count = conn.execute(
              'SELECT COUNT(*) FROM options_settlements'
          ).fetchone()[0]
          rv_count = conn.execute(
              'SELECT COUNT(*) FROM realized_volatility'
          ).fetchone()[0]
          dp_count = conn.execute(
              'SELECT COUNT(*) FROM delivery_prices'
          ).fetchone()[0]

          conn.close()

          summary = f'''## Deribit Options Data Summary
          | Metric | Value |
          |--------|-------|
          | Snapshot rows | {snap_count:,} |
          | Unique instruments | {instr_count:,} |
          | Latest snapshot | {latest} |
          | DVOL candles | {dvol_count:,} |
          | Realized vol records | {rv_count:,} |
          | Settlement records | {settle_count:,} |
          | Delivery prices | {dp_count:,} |
          '''

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          "
