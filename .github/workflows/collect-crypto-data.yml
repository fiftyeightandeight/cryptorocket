name: Collect Crypto Data

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols (blank = top perps by volume)"
        required: false
        default: ""
      intervals:
        description: "Comma-separated intervals"
        required: false
        default: "1h,1d"
      backfill_days:
        description: "Days of history to backfill (for first run or catch-up)"
        required: false
        default: "7"

concurrency:
  group: data-db-push
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download database from release
        run: gh release download data-latest -p crypto.duckdb -D data/ --clobber 2>/dev/null || echo "No existing release, starting fresh"
        env:
          GH_TOKEN: ${{ secrets.DATA_BOT_TOKEN }}

      - name: Collect data
        run: |
          python -m scripts.gh_collect \
            --intervals "${{ github.event.inputs.intervals || '1h,1d' }}" \
            --backfill-days "${{ github.event.inputs.backfill_days || '7' }}" \
            ${{ github.event.inputs.symbols && format('--symbols {0}', github.event.inputs.symbols) || '' }}

      - name: Checkpoint database (flush WAL to main file)
        run: python -c "import duckdb; c = duckdb.connect('data/crypto.duckdb'); c.execute('CHECKPOINT'); c.close()"

      - name: Upload database to release
        run: |
          gh release upload data-latest data/crypto.duckdb --clobber 2>/dev/null || \
          gh release create data-latest data/crypto.duckdb \
            --title "Latest database" \
            --notes "Auto-updated by data collection workflow"
        env:
          GH_TOKEN: ${{ secrets.DATA_BOT_TOKEN }}

      - name: Report summary
        run: |
          python -c "
          import duckdb
          conn = duckdb.connect('data/crypto.duckdb', read_only=True)
          candle_count = conn.execute('SELECT COUNT(*) FROM candles').fetchone()[0]
          symbol_count = conn.execute('SELECT COUNT(DISTINCT symbol) FROM candles').fetchone()[0]
          intervals = conn.execute('SELECT DISTINCT interval FROM candles ORDER BY interval').fetchall()
          latest = conn.execute('SELECT MAX(timestamp) FROM candles').fetchone()[0]
          conn.close()

          summary = f'''## Crypto Data Collection Summary
          | Metric | Value |
          |--------|-------|
          | Total candles | {candle_count:,} |
          | Symbols | {symbol_count} |
          | Intervals | {', '.join(i[0] for i in intervals)} |
          | Latest candle | {latest} |
          '''

          import os
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          "
